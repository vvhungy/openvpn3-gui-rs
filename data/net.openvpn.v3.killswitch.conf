<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Root owns the service name -->
  <policy user="root">
    <allow own="net.openvpn.v3.killswitch"/>
  </policy>

  <!-- Members of netdev / sudo may call methods -->
  <policy group="netdev">
    <allow send_destination="net.openvpn.v3.killswitch"/>
  </policy>

  <policy group="sudo">
    <allow send_destination="net.openvpn.v3.killswitch"/>
  </policy>

</busconfig>
