name: Release

# Expected release artifacts (manifest — keep in sync with build steps below):
#   target/debian/openvpn3-gui-rs_<ver>_amd64.deb
#   target/debian/openvpn3-killswitch-helper_<ver>_amd64.deb
#   target/generate-rpm/openvpn3-gui-rs-<ver>-1.x86_64.rpm
#   target/generate-rpm/openvpn3-killswitch-helper-<ver>-1.x86_64.rpm
# Every build step ends with `ls -la <glob>` so a silent produce-step failure
# surfaces at the failing step, not downstream at upload time (v0.3.0 incident).

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-packages:
    name: Build release packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            dbus \
            pkg-config \
            rpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Build DEB (GUI)
        run: |
          cargo deb -p openvpn3-gui-rs --no-build
          ls -la target/debian/openvpn3-gui-rs_*.deb

      - name: Build DEB (helper)
        run: |
          cargo deb -p openvpn3-killswitch-helper --no-build
          ls -la target/debian/openvpn3-killswitch-helper_*.deb

      - name: Build RPM (GUI)
        working-directory: gui
        run: |
          mkdir -p ../target/generate-rpm
          cargo generate-rpm -o ../target/generate-rpm
          ls -la ../target/generate-rpm/openvpn3-gui-rs-*.rpm

      - name: Build RPM (helper)
        working-directory: helper
        run: |
          cargo generate-rpm -o ../target/generate-rpm
          ls -la ../target/generate-rpm/openvpn3-killswitch-helper-*.rpm

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-packages
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
